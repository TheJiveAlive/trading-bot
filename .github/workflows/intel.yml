name: hourly-intel
on:
  schedule:
    - cron: '8 14,17,20 * * 1-5'   # every ~3h during US market hours (lighter Claude usage)
  workflow_dispatch:

permissions:
  contents: write
concurrency:
  group: intel
  cancel-in-progress: true

jobs:
  intel:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: check token
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          APIKEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$TOKEN" ] && [ -z "$APIKEY" ]; then
            echo "no token — skipping hourly intel"
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - name: market hours guard
        if: env.SKIP != '1'
        run: |
          H=$(TZ=America/New_York date +%H); DOW=$(TZ=America/New_York date +%u)
          if [ "$DOW" -gt 5 ] || [ "$H" -lt 9 ] || [ "$H" -ge 16 ]; then
            echo "market closed — skipping"; echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP != '1'

      - uses: actions/setup-node@v4
        if: env.SKIP != '1'
        with:
          node-version: '22'

      - name: install claude code
        if: env.SKIP != '1'
        run: npm install -g @anthropic-ai/claude-code

      - name: run intel session
        if: env.SKIP != '1'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then unset CLAUDE_CODE_OAUTH_TOKEN; fi
          claude -p "$(cat research/intel_prompt.md)" \
            --allowedTools "WebSearch,WebFetch,Read,Write" \
            --permission-mode acceptEdits

      - name: commit intel
        if: env.SKIP != '1'
        run: |
          git config user.name "trading-bot"
          git config user.email "trading-bot@users.noreply.github.com"
          rm -f data/secrets.json
          git add -A
          git commit -m "hourly intel $(date -u '+%H:%M') UTC" || echo "no changes"
          for i in 1 2 3; do
            git pull --rebase -X ours origin main && git push && break
            sleep 3
          done
