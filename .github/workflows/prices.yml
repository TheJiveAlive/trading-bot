name: live-prices
# Lightweight quote refresh → data/prices.json in this public repo. The
# dashboard polls it from the browser via raw.githubusercontent (CORS-enabled),
# giving a near-live feed with no key exposure. Public repo = free minutes.
on:
  schedule:
    - cron: '*/5 13-21 * * 1-5'   # every 5 min during US market hours (UTC)
  workflow_dispatch:

permissions:
  contents: write
concurrency:
  group: prices
  cancel-in-progress: true

jobs:
  prices:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: market hours guard
        run: |
          H=$(TZ=America/New_York date +%H); DOW=$(TZ=America/New_York date +%u); M=$(TZ=America/New_York date +%M)
          if [ "$DOW" -gt 5 ] || [ "$H" -lt 9 ] || [ "$H" -ge 16 ] || { [ "$H" -eq 9 ] && [ "$M" -lt 30 ]; }; then
            echo "closed"; echo "SKIP=1" >> "$GITHUB_ENV"
          fi
      - uses: actions/checkout@v4
        if: env.SKIP != '1'
      - uses: actions/setup-python@v5
        if: env.SKIP != '1'
        with:
          python-version: '3.12'
          cache: pip
      - name: install deps
        if: env.SKIP != '1'
        run: pip install -r requirements.txt
      - name: materialize secrets (alpaca + smtp for exit alerts + t212 for broker truth)
        if: env.SKIP != '1'
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          T212_API_KEY: ${{ secrets.T212_API_KEY }}
        run: |
          mkdir -p data logs publish
          python3 -c "
          import json, os
          json.dump({'smtp_host':'smtp.gmail.com','smtp_port':465,
                     'smtp_user':os.environ.get('SMTP_USER',''),
                     'smtp_app_password':os.environ.get('SMTP_APP_PASSWORD',''),
                     'email_to':os.environ.get('EMAIL_TO',''),
                     'alpaca_key':os.environ.get('ALPACA_KEY',''),
                     'alpaca_secret':os.environ.get('ALPACA_SECRET',''),
                     't212_api_key':os.environ.get('T212_API_KEY','')},
                    open('data/secrets.json','w'))"
      - name: prices + exit check (stops fire every 5 min, not once a day)
        if: env.SKIP != '1'
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: |
          python -m bot.prices
          python run.py exits || true
      - name: commit prices + any exit
        if: env.SKIP != '1'
        run: |
          rm -f data/secrets.json
          git config user.name "trading-bot"
          git config user.email "trading-bot@users.noreply.github.com"
          git add -A data dashboard.html radar.html history.html
          git commit -m "prices+exits $(date -u '+%H:%M') UTC" || echo "no change"
          for i in 1 2 3; do git pull --rebase -X ours origin main && git push && break; sleep 2; done
