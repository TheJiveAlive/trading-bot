name: persist-secrets
# ONE-SHOT: writes the bot's API keys from GitHub secrets to a permanent vault
# on the OptiPlex (~/.bot/secrets.json, 0600) so the NATIVE trading loop runs
# without any GitHub dependency. Values are never printed. Re-run any time a
# key rotates.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  persist:
    runs-on: [self-hosted, optiplex]
    timeout-minutes: 3
    steps:
      - name: write vault
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          T212_API_KEY: ${{ secrets.T212_API_KEY }}
          T212_API_SECRET: ${{ secrets.T212_API_SECRET }}
          ALPHAI_KEY: ${{ secrets.ALPHAI_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DASHBOARD_DEPLOY_KEY: ${{ secrets.DASHBOARD_DEPLOY_KEY }}
          GH_WORKFLOW_TOKEN: ${{ secrets.GH_WORKFLOW_TOKEN }}
        run: |
          mkdir -p ~/.bot && chmod 700 ~/.bot
          python3 - <<'PY'
          import json, os
          keys = {"smtp_host": "smtp.gmail.com", "smtp_port": 465,
                  "smtp_user": os.environ.get("SMTP_USER",""),
                  "smtp_app_password": os.environ.get("SMTP_APP_PASSWORD",""),
                  "email_to": os.environ.get("EMAIL_TO",""),
                  "finnhub_key": os.environ.get("FINNHUB_KEY",""),
                  "t212_api_key": os.environ.get("T212_API_KEY",""),
                  "t212_api_secret": os.environ.get("T212_API_SECRET",""),
                  "alphai_key": os.environ.get("ALPHAI_KEY",""),
                  "fred_api_key": os.environ.get("FRED_API_KEY",""),
                  "alpaca_key": os.environ.get("ALPACA_KEY",""),
                  "alpaca_secret": os.environ.get("ALPACA_SECRET",""),
                  "claude_code_oauth_token": os.environ.get("CLAUDE_CODE_OAUTH_TOKEN",""),
                  "dashboard_deploy_key": os.environ.get("DASHBOARD_DEPLOY_KEY",""),
                  "gh_workflow_token": os.environ.get("GH_WORKFLOW_TOKEN","")}
          path = os.path.expanduser("~/.bot/secrets.json")
          with open(path, "w") as f:
              json.dump(keys, f, indent=2)
          os.chmod(path, 0o600)
          filled = sum(1 for v in keys.values() if v)
          print("vault written: {} ({}/{} keys populated)".format(path, filled, len(keys)))
          PY
