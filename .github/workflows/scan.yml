name: trading-scan
on:
  schedule:
    # market hours (UTC): full trading scan on the hour (:33);
    # price/dashboard refresh every 15 min (:03,:18,:48). Public repo = unlimited minutes.
    - cron: '33 13-21 * * 1-5'
    - cron: '3,18,48 14-21 * * 1-5'
    # off-hours — hourly dashboard refresh
    - cron: '33 7-12,22 * * *'
  workflow_dispatch:

permissions:
  contents: write
concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: decide mode (scan during US market hours, refresh otherwise)
        run: |
          H=$(TZ=America/New_York date +%H)
          M=$(TZ=America/New_York date +%M)
          DOW=$(TZ=America/New_York date +%u)
          UM=$(date -u +%M)
          MODE=refresh
          # full scan only on the :33 slot (UTC min 30-40); other quarter-hour
          # slots just refresh prices on the dashboard
          if [ "$DOW" -le 5 ] && [ "$H" -ge 9 ] && [ "$H" -lt 16 ] && [ "$UM" -ge 30 ] && [ "$UM" -le 40 ]; then
            if [ "$H" -gt 9 ] || [ "$M" -ge 30 ]; then MODE=scan; fi
          fi
          echo "MODE=$MODE" >> "$GITHUB_ENV"
          echo "mode: $MODE (utc min $UM)"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: materialize email secrets
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          T212_API_KEY: ${{ secrets.T212_API_KEY }}
        run: |
          mkdir -p data logs publish
          python3 -c "
          import json, os
          json.dump({'smtp_host':'smtp.gmail.com','smtp_port':465,
                     'smtp_user':os.environ.get('SMTP_USER',''),
                     'smtp_app_password':os.environ.get('SMTP_APP_PASSWORD',''),
                     'email_to':os.environ.get('EMAIL_TO',''),
                     'finnhub_key':os.environ.get('FINNHUB_KEY',''),
                     't212_api_key':os.environ.get('T212_API_KEY','')},
                    open('data/secrets.json','w'))"

      - name: refresh GitHub workflow status for the dashboard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import json, subprocess, datetime
          def parse(t):
              try: return datetime.datetime.fromisoformat(t.replace("Z","+00:00"))
              except Exception: return None
          wanted = ["trading-scan","hourly-intel","daily-research","weekly-review","backtest"]
          now = datetime.datetime.now(datetime.timezone.utc)
          out = {"generated": now.isoformat(timespec="seconds"), "workflows": {}}
          for wf in wanted:
              try:
                  # last 3 runs, so we can show a currently-running one AND the last finished
                  r = subprocess.run(["gh","run","list","--workflow",wf+".yml","--limit","3",
                      "--json","conclusion,createdAt,startedAt,updatedAt,status"],
                      capture_output=True,text=True,timeout=30)
                  arr = json.loads(r.stdout or "[]")
                  if not arr: continue
                  latest = arr[0]
                  status = latest.get("status")   # queued|in_progress|completed
                  started, updated = parse(latest.get("startedAt")), parse(latest.get("updatedAt"))
                  info = {"status":status, "conclusion":latest.get("conclusion"),
                          "when":latest.get("createdAt","")}
                  if status == "completed" and started and updated:
                      info["duration_s"] = int((updated-started).total_seconds())
                  elif status in ("in_progress","queued") and started:
                      info["running_s"] = int((now-started).total_seconds())
                  # avg duration of last completed runs (rough progress denominator)
                  durs = [int((parse(x["updatedAt"])-parse(x["startedAt"])).total_seconds())
                          for x in arr if x.get("status")=="completed"
                          and parse(x.get("startedAt")) and parse(x.get("updatedAt"))]
                  if durs: info["avg_s"] = int(sum(durs)/len(durs))
                  out["workflows"][wf] = info
              except Exception:
                  pass
          json.dump(out, open("data/health.json","w"), indent=2)
          print("health.json:", json.dumps(out, indent=2))
          PY

      - name: full scan (market hours)
        if: env.MODE == 'scan'
        run: python run.py scan

      - name: dashboard refresh (off hours)
        if: env.MODE == 'refresh'
        run: python run.py dashboard

      - name: persist ledger state
        run: |
          rm -f data/secrets.json
          git config user.name "trading-bot"
          git config user.email "trading-bot@users.noreply.github.com"
          git add -A data dashboard.html
          git commit -m "$MODE $(date -u '+%Y-%m-%d %H:%M') UTC" || echo "no changes"
          git pull --rebase origin main || true
          git push

      - name: publish dashboard to Pages repo
        if: vars.DASHBOARD_REPO != ''
        run: |
          echo "${{ secrets.DASHBOARD_DEPLOY_KEY }}" > /tmp/dk
          chmod 600 /tmp/dk
          export GIT_SSH_COMMAND="ssh -i /tmp/dk -o StrictHostKeyChecking=no"
          git clone --depth 1 "git@github.com:${{ vars.DASHBOARD_REPO }}.git" /tmp/dash
          cp publish/*.html /tmp/dash/
          cd /tmp/dash
          git config user.name "trading-bot"
          git config user.email "trading-bot@users.noreply.github.com"
          git add -A
          git commit -m "dashboard $(date -u '+%H:%M') UTC" || exit 0
          git push
