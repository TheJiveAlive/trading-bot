name: trading-scan
on:
  schedule:
    # market window (UTC) — full scans when US market is open
    - cron: '33 13-21 * * 1-5'
    # off-hours — hourly dashboard refresh (7:33-12:33 & 22:33 UTC, every day)
    - cron: '33 7-12,22 * * *'
  workflow_dispatch:

permissions:
  contents: write
concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: decide mode (scan during US market hours, refresh otherwise)
        run: |
          H=$(TZ=America/New_York date +%H)
          M=$(TZ=America/New_York date +%M)
          DOW=$(TZ=America/New_York date +%u)
          MODE=refresh
          if [ "$DOW" -le 5 ] && [ "$H" -ge 9 ] && [ "$H" -lt 16 ]; then
            if [ "$H" -gt 9 ] || [ "$M" -ge 30 ]; then MODE=scan; fi
          fi
          echo "MODE=$MODE" >> "$GITHUB_ENV"
          echo "mode: $MODE"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: materialize email secrets
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: |
          mkdir -p data logs publish
          python3 -c "
          import json, os
          json.dump({'smtp_host':'smtp.gmail.com','smtp_port':465,
                     'smtp_user':os.environ.get('SMTP_USER',''),
                     'smtp_app_password':os.environ.get('SMTP_APP_PASSWORD',''),
                     'email_to':os.environ.get('EMAIL_TO',''),
                     'finnhub_key':os.environ.get('FINNHUB_KEY','')},
                    open('data/secrets.json','w'))"

      - name: full scan (market hours)
        if: env.MODE == 'scan'
        run: python run.py scan

      - name: dashboard refresh (off hours)
        if: env.MODE == 'refresh'
        run: python run.py dashboard

      - name: persist ledger state
        run: |
          rm -f data/secrets.json
          git config user.name "trading-bot"
          git config user.email "trading-bot@users.noreply.github.com"
          git add -A data dashboard.html
          git commit -m "$MODE $(date -u '+%Y-%m-%d %H:%M') UTC" || echo "no changes"
          git pull --rebase origin main || true
          git push

      - name: publish dashboard to Pages repo
        if: vars.DASHBOARD_REPO != ''
        run: |
          echo "${{ secrets.DASHBOARD_DEPLOY_KEY }}" > /tmp/dk
          chmod 600 /tmp/dk
          export GIT_SSH_COMMAND="ssh -i /tmp/dk -o StrictHostKeyChecking=no"
          git clone --depth 1 "git@github.com:${{ vars.DASHBOARD_REPO }}.git" /tmp/dash
          cp publish/index.html /tmp/dash/index.html
          cd /tmp/dash
          git config user.name "trading-bot"
          git config user.email "trading-bot@users.noreply.github.com"
          git add -A
          git commit -m "dashboard $(date -u '+%H:%M') UTC" || exit 0
          git push
