name: market-session
# ONE trigger → runs continuously for the whole US market session, updating
# prices every ~60s and scanning every ~15 min INTERNALLY. This removes the
# dependence on GitHub's unreliable per-interval cron: only the session START
# needs to fire (daily cron OR one manual click), then it self-loops for hours.
# FALLBACK ONLY since 2026-07-13: the native systemd loop on the OptiPlex
# (~/bot/session.sh) is the primary session. The watchdog dispatches this
# cloud copy only when the native heartbeat goes stale.
on:
  workflow_dispatch:

permissions:
  contents: write
concurrency:
  group: session
  cancel-in-progress: false

jobs:
  session:
    runs-on: [self-hosted, optiplex]   # runs on the OptiPlex (no 6h cap, reliable)
    timeout-minutes: 420   # covers the full ~6.5h US session
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: install deps
        run: pip install -r requirements.txt
      - name: materialize secrets
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          T212_API_KEY: ${{ secrets.T212_API_KEY }}
          T212_API_SECRET: ${{ secrets.T212_API_SECRET }}
          ALPHAI_KEY: ${{ secrets.ALPHAI_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: |
          mkdir -p data logs publish
          python3 -c "
          import json, os
          json.dump({'smtp_host':'smtp.gmail.com','smtp_port':465,
                     'smtp_user':os.environ.get('SMTP_USER',''),
                     'smtp_app_password':os.environ.get('SMTP_APP_PASSWORD',''),
                     'email_to':os.environ.get('EMAIL_TO',''),
                     'finnhub_key':os.environ.get('FINNHUB_KEY',''),
                     't212_api_key':os.environ.get('T212_API_KEY',''),
                     't212_api_secret':os.environ.get('T212_API_SECRET',''),
                     'alphai_key':os.environ.get('ALPHAI_KEY',''),
                     'fred_api_key':os.environ.get('FRED_API_KEY',''),
                     'alpaca_key':os.environ.get('ALPACA_KEY',''),
                     'alpaca_secret':os.environ.get('ALPACA_SECRET','')},
                    open('data/secrets.json','w'))"
      - name: run the session loop
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          T212_API_KEY: ${{ secrets.T212_API_KEY }}
          T212_API_SECRET: ${{ secrets.T212_API_SECRET }}
          ALPHAI_KEY: ${{ secrets.ALPHAI_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DASH_KEY: ${{ secrets.DASHBOARD_DEPLOY_KEY }}
          DASH_REPO: ${{ vars.DASHBOARD_REPO }}
        run: |
          git config user.name "trading-bot"
          git config user.email "trading-bot@users.noreply.github.com"
          # clone the Pages repo once so we can publish HTML after each scan
          if [ -n "$DASH_REPO" ]; then
            echo "$DASH_KEY" > /tmp/dk; chmod 600 /tmp/dk
            export GIT_SSH_COMMAND="ssh -i /tmp/dk -o StrictHostKeyChecking=no"
            git clone --depth 1 "git@github.com:$DASH_REPO.git" /tmp/dash 2>/dev/null || true
          fi
          # reseed must restore EVERY key (secrets.json is wiped before each
          # commit) — a partial reseed silently disables T212 routing + emails
          # for the rest of the session
          reseed() { python3 -c "
          import json,os
          json.dump({'smtp_host':'smtp.gmail.com','smtp_port':465,
                     'smtp_user':os.environ.get('SMTP_USER',''),
                     'smtp_app_password':os.environ.get('SMTP_APP_PASSWORD',''),
                     'email_to':os.environ.get('EMAIL_TO',''),
                     'finnhub_key':os.environ.get('FINNHUB_KEY',''),
                     't212_api_key':os.environ.get('T212_API_KEY',''),
                     't212_api_secret':os.environ.get('T212_API_SECRET',''),
                     'alphai_key':os.environ.get('ALPHAI_KEY',''),
                     'fred_api_key':os.environ.get('FRED_API_KEY',''),
                     'alpaca_key':os.environ.get('ALPACA_KEY',''),
                     'alpaca_secret':os.environ.get('ALPACA_SECRET','')},
                    open('data/secrets.json','w'))" 2>/dev/null || true; }
          reseed
          # live status line to any terminal open on the OptiPlex (utmp is gone
          # on Ubuntu 26.04, so write straight to the pts/tty devices)
          bcast() { for t in /dev/pts/[0-9]* /dev/tty1; do printf '%b\n' "$1" > "$t" 2>/dev/null || true; done; }
          bcast "\033[36m[session] starting on tradinghost — scanning the market live\033[0m"
          cycle=0
          while true; do
            H=$(TZ=America/New_York date +%H); M=$(TZ=America/New_York date +%M); D=$(TZ=America/New_York date +%u)
            if [ "$D" -gt 5 ] || [ "$H" -ge 16 ] || [ "$H" -lt 9 ] || { [ "$H" -eq 9 ] && [ "$M" -lt 30 ]; }; then
              bcast "\033[33m[session] market closed — ending after $cycle cycles\033[0m"
              echo "market closed — ending session after $cycle cycles"; break
            fi
            python -m bot.prices >/dev/null 2>&1 || true   # ~30s live price refresh
            SCANNED=0; ACT="prices"
            if [ $((cycle % 10)) -eq 0 ]; then
              ACT="FULL SCAN"; echo "cycle $cycle: full scan"; python run.py scan >/dev/null 2>&1 || true; SCANNED=1
            elif [ $((cycle % 2)) -eq 0 ]; then
              ACT="exit-check"; python run.py exits >/dev/null 2>&1 || true
            fi
            # broadcast a live status line to the terminal every cycle (~30s)
            STAT=$(python3 -c "
          import sqlite3
          c=sqlite3.connect('data/ledger.db')
          cash=c.execute(\"SELECT value FROM meta WHERE key='cash'\").fetchone()
          n=c.execute('SELECT COUNT(*) FROM positions').fetchone()[0]
          r=c.execute('SELECT kind,detail FROM decisions ORDER BY id DESC LIMIT 1').fetchone()
          print('\$'+str(cash[0] if cash else '?')+' | '+str(n)+' pos | last: '+((r[0]+' '+r[1][:44]) if r else 'none'))
          " 2>/dev/null)
            bcast "[session] c$cycle $(TZ=America/New_York date +%H:%M:%S)ET | $ACT | $STAT"
            rm -f data/secrets.json
            git add -A data dashboard.html radar.html history.html >/dev/null 2>&1 || true
            git commit -q -m "session c$cycle $(date -u '+%H:%M:%S')" >/dev/null 2>&1 || true
            for i in 1 2 3; do
              git pull --rebase -X ours -q origin main >/dev/null 2>&1 && git push -q >/dev/null 2>&1 && break; sleep 2
            done
            # after a scan, push refreshed HTML to the Pages repo
            if [ "$SCANNED" = "1" ] && [ -d /tmp/dash ]; then
              cp publish/*.html /tmp/dash/ 2>/dev/null || true
              ( cd /tmp/dash && git add -A && git commit -q -m "session dash c$cycle" && git push -q ) 2>/dev/null || true
            fi
            reseed
            cycle=$((cycle+1))
            sleep 30
          done
