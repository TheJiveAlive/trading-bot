name: overnight-learnings
# Out-of-hours study: refresh the parameter sweep + a Claude analysis session
# that writes proposed improvements to data/learnings.md. Runs nightly.
on:
  schedule:
    - cron: '17 2 * * 2-6'   # 1x/day overnight (was 2x) — token thrift; heavy compute is Python-only anyway
  workflow_dispatch:

permissions:
  contents: write
concurrency:
  group: learnings

jobs:
  study:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: check token
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          APIKEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$TOKEN" ] && [ -z "$APIKEY" ]; then
            echo "no token/key — skipping"; echo "SKIP=1" >> "$GITHUB_ENV"
          fi
      - uses: actions/checkout@v4
        if: env.SKIP != '1'
      - uses: actions/setup-python@v5
        if: env.SKIP != '1'
        with:
          python-version: '3.12'
          cache: pip
      - name: install deps
        if: env.SKIP != '1'
        run: pip install -r requirements.txt
      - name: refresh parameter sweep (cached candidates → fast)
        if: env.SKIP != '1'
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python backtest.py --months 6 --tune || echo "tune skipped (no cache yet)"

      - name: walk-forward validation (out-of-sample truth serum)
        if: env.SKIP != '1'
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python backtest.py --walkforward || echo "walkforward skipped (no cache yet)"
      - name: apply bounded signal-weight learning
        if: env.SKIP != '1'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python3 -c "
          import json, os
          json.dump({'smtp_host':'smtp.gmail.com','smtp_port':465,
                     'smtp_user':os.environ.get('SMTP_USER',''),
                     'smtp_app_password':os.environ.get('SMTP_APP_PASSWORD',''),
                     'email_to':os.environ.get('EMAIL_TO','')}, open('data/secrets.json','w'))"
          python -m bot.learn || echo "learning: insufficient evidence"
          python -m bot.learn tune || echo "auto-tune: skipped"
          rm -f data/secrets.json
      - uses: actions/setup-node@v4
        if: env.SKIP != '1'
        with:
          node-version: '22'
      - name: install claude code
        if: env.SKIP != '1'
        run: npm install -g @anthropic-ai/claude-code
      - name: run study session
        if: env.SKIP != '1'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then unset CLAUDE_CODE_OAUTH_TOKEN; fi
          claude -p "$(cat research/study_prompt.md)" \
            --allowedTools "Read,Write,Bash(python3:*),WebSearch,WebFetch" \
            --permission-mode acceptEdits --output-format json > /tmp/claude_study.json \
            || echo "::warning::claude session skipped (usage limit or transient error) — continuing"
          python -m bot.token_log /tmp/claude_study.json study || true
      - name: commit + email learnings
        if: env.SKIP != '1'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          # email the latest learnings section, Markdown-rendered, BEFORE removing secrets
          python3 -c "
          import re
          from bot import config, notify
          config.load()
          try: md=open('data/learnings.md').read()
          except Exception: md='no learnings file produced'
          # send only the most recent dated section (from the last '## ' heading)
          parts=md.split('\n## ')
          latest=('## '+parts[-1]) if len(parts)>1 else md
          notify.send_email('[bot] overnight learnings', latest[:6000], markdown=True)" || true
          rm -f data/secrets.json
          git config user.name "trading-bot"
          git config user.email "trading-bot@users.noreply.github.com"
          git add -A
          git commit -m "overnight learnings $(date -u '+%Y-%m-%d')" || echo "no changes"
          for i in 1 2 3; do git pull --rebase -X ours origin main && git push && break; sleep 3; done
