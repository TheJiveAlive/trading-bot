name: overnight-learnings
# STUDY-ONLY since 2026-07-14. The heavy Python compute (parameter sweep,
# walk-forward, weight learning) runs NATIVELY on the OptiPlex where the
# 5.7M-row bar cache lives — this runner is a blank machine with no bars.db,
# and running the sweep here starved it into a -100%/0-trade walkforward on
# 07-12. The box (~/bot/learning_compute.sh, bot-learnings.timer) computes,
# commits the results, then dispatches THIS workflow, which only runs the
# sandboxed Claude study session over the freshly-pushed numbers.
on:
  workflow_dispatch:

permissions:
  contents: write
concurrency:
  group: learnings

jobs:
  study:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: check token
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          APIKEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$TOKEN" ] && [ -z "$APIKEY" ]; then
            echo "no token/key — skipping"; echo "SKIP=1" >> "$GITHUB_ENV"
          fi
      - uses: actions/checkout@v4
        if: env.SKIP != '1'
      - uses: actions/setup-node@v4
        if: env.SKIP != '1'
        with:
          node-version: '22'
      - name: install claude code
        if: env.SKIP != '1'
        run: npm install -g @anthropic-ai/claude-code
      - name: run study session
        if: env.SKIP != '1'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then unset CLAUDE_CODE_OAUTH_TOKEN; fi
          claude -p "$(cat research/study_prompt.md)" \
            --model claude-opus-4-8 \
            --allowedTools "Read,Write,Bash(python3:*),WebSearch,WebFetch" \
            --permission-mode acceptEdits --output-format json > /tmp/claude_study.json \
            || echo "::warning::claude session skipped (usage limit or transient error) — continuing"
          python -m bot.token_log /tmp/claude_study.json study || true
      - name: commit + email learnings
        if: env.SKIP != '1'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          # email the latest learnings section, Markdown-rendered, BEFORE removing secrets
          python3 -c "
          import json, os
          json.dump({'smtp_host':'smtp.gmail.com','smtp_port':465,
                     'smtp_user':os.environ.get('SMTP_USER',''),
                     'smtp_app_password':os.environ.get('SMTP_APP_PASSWORD',''),
                     'email_to':os.environ.get('EMAIL_TO','')}, open('data/secrets.json','w'))"
          python3 -c "
          from bot import config, notify
          config.load()
          try: md=open('data/learnings.md').read()
          except Exception: md='no learnings file produced'
          parts=md.split('\n## ')
          latest=('## '+parts[-1]) if len(parts)>1 else md
          notify.send_email('[bot] overnight learnings', latest[:6000], markdown=True)" || true
          rm -f data/secrets.json
          git config user.name "trading-bot"
          git config user.email "trading-bot@users.noreply.github.com"
          git add -A
          git commit -m "overnight learnings $(date -u '+%Y-%m-%d')" || echo "no changes"
          for i in 1 2 3; do git pull --rebase -X ours origin main && git push && break; sleep 3; done
